<div class="col-span-2 rounded overflow-hidden shadow-lg transition duration-300 ease-in-out transform hover:-translate-y-1 hover:scale-102">
    <a href="{{ post.permalink | relative_url }}">
        <div class="bg-no-repeat bg-center" style="background-image: url('/assets/card-top.jpg')">
            <div class="px-6 py-4">
                <div class="font-bold text-xl mb-2">{{ post.title | escape }}</div>
                <p class="text-gray-700 text-base">
                    {{ post.date | escape }}
                </p>
            </div>
            <div class="px-6 py-4">
                {%- for category in post.categories -%}
                <span class="inline-block bg-gray-200 rounded-full px-3 py-1 text-sm font-semibold text-gray-700 mr-2">#{{ category }}</span>
                {%- endfor -%}
            </div>
        </div>
    </a>
</div>
